# 仅手动触发：向 Cloudflare Pages 发布「静态 + API 代理」预览，不替代 Vercel 自动部署。
# 需在仓库 Secrets 配置：CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID（见 Cloudflare Dashboard → API Tokens）

name: Cloudflare Pages (preview, manual)

on:
  workflow_dispatch:

concurrency:
  group: deploy-cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build static output for Pages
        run: npm run build:cf

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-cf --project-name=seedance-2-cf-preview
