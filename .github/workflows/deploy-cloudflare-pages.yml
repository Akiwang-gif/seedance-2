# 推送到 main 时自动部署到 Cloudflare Pages；也可在 Actions 里手动 Run workflow。
# 需在仓库 Secrets 配置：CLOUDFLARE_API_TOKEN、CLOUDFLARE_ACCOUNT_ID（见 Cloudflare Dashboard → API Tokens）

name: Cloudflare Pages (preview)

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-cf-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Build static output for Pages
        run: npm run build:cf

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-cf --project-name=seedance-2-cf-preview
