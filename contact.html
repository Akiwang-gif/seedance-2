<!DOCTYPE html>
<html lang="en">
<head>

    <link rel="shortcut icon" href="/icon.png">
    <link rel="apple-touch-icon" href="/icon.png">
    <meta name="robots" content="index, follow">
    <title>Contact · Seedance-2</title>
    <meta name="description" content="Contact Seedance-2 for inquiries, feedback, or support. | seedance-2.info">
    <link rel="canonical" href="https://seedance-2.info/contact.html">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Seedance-2">
    <meta property="og:title" content="Contact · Seedance-2">
    <meta property="og:description" content="Contact Seedance-2 for inquiries, feedback, support, and collaboration.">
    <meta property="og:url" content="https://seedance-2.info/contact.html">
    <meta property="og:image" content="https://seedance-2.info/og-image.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Contact · Seedance-2">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1d1d1f; --text-muted: #6e6e73; --border: #eee; --accent: #c0392b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; margin: 0; display: flex; align-items: center; gap: 0.5rem; }
        .logo a { color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo a:hover { color: var(--text-muted); }
        .logo .site-icon { width: 32px; height: 32px; min-width: 32px; min-height: 32px; object-fit: contain; display: block; flex-shrink: 0; }
        .back-link {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text); }
        .site-nav-bar {
            background: #fafafa;
            border-bottom: 1px solid var(--border);
        }
        .site-nav-bar-inner {
            max-width: 900px;
            margin: 0 auto;
            padding: 0.65rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.75rem 1rem;
        }
        .site-nav-links {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 0.35rem 1.25rem;
        }
        .site-nav-links a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            font-weight: 500;
        }
        .site-nav-links a:hover { color: var(--accent); }
        .site-nav-search {
            display: flex;
            align-items: stretch;
            gap: 0.35rem;
        }
        .site-nav-search input[type="search"] {
            min-width: 120px;
            width: min(200px, 38vw);
            padding: 0.45rem 0.65rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            background: #fff;
        }
        .site-nav-search input[type="search"]:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(192, 57, 43, 0.12);
        }
        .site-nav-search button {
            padding: 0.45rem 0.85rem;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .site-nav-search button:hover { opacity: 0.92; }
        .visually-hidden {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }
        .page-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }
        .page-content h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
        .page-content p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }
        @media (max-width: 600px) {
            .site-header, .page-content { padding-left: 1rem; padding-right: 1rem; }
            .site-nav-bar-inner { padding: 0.65rem 1rem; }
            .site-nav-search { width: 100%; }
            .site-nav-search input[type="search"] { flex: 1; width: auto; min-width: 0; }
        }
    </style>
</head>
<body>
    <header class="site-header" role="banner">
        <h1 class="logo"><a href="index.html" aria-label="Seedance-2 Home"><img src="icon.png" alt="" class="site-icon" width="32" height="32">Seedance-2</a></h1>
        <a href="index.html" class="back-link">Back to Home</a>
    </header>
    <nav class="site-nav-bar" aria-label="Site navigation">
        <div class="site-nav-bar-inner">
            <div class="site-nav-links">
                <a href="articles.html">Articles</a>
                <a href="about-us.html">About Us</a>
                <a href="privacy-policy.html">Privacy Policy</a>
                <a href="terms-of-service.html">Terms of Service</a>
            </div>
            <form class="site-nav-search" action="articles.html" method="get" role="search">
                <label class="visually-hidden" for="nav-search-q-contact">Search articles</label>
                <input id="nav-search-q-contact" type="search" name="q" placeholder="Search articles…" autocomplete="off">
                <button type="submit">Search</button>
            </form>
        </div>
    </nav>
    <main class="page-content" role="main">
        <h1>Contact</h1>
        <p>Get in touch with us. For general inquiries, feedback, or support, please use the contact details provided on this page.</p>
    </main>
</body>
</html>
