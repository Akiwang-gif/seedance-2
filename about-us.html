<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="index, follow">
    <title>About Us · Seedance-2</title>
    <meta name="description" content="About Seedance-2 — your trusted source for news, videos, podcasts, and live updates. | seedance-2.info">
    <link rel="canonical" href="https://seedance-2.info/about-us.html">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fff; --text: #1d1d1f; --text-muted: #6e6e73; --border: #eee; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }
        .site-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 2rem;
            max-width: 900px;
            margin: 0 auto;
            border-bottom: 1px solid var(--border);
        }
        .logo { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.03em; margin: 0; display: flex; align-items: center; gap: 0.5rem; }
        .logo a { color: var(--text); text-decoration: none; display: flex; align-items: center; gap: 0.5rem; }
        .logo a:hover { color: var(--text-muted); }
        .logo .site-icon { width: 32px; height: 32px; min-width: 32px; min-height: 32px; object-fit: contain; display: block; flex-shrink: 0; }
        .back-link {
            font-size: 0.95rem;
            color: var(--text-muted);
            text-decoration: none;
        }
        .back-link:hover { color: var(--text); }
        .page-content {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 2rem 3rem;
        }
        .page-content h1 { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.75rem; }
        .page-content p { color: var(--text-muted); font-size: 0.95rem; line-height: 1.6; }
        @media (max-width: 600px) { .site-header, .page-content { padding-left: 1rem; padding-right: 1rem; } }
    </style>
</head>
<body>
    <header class="site-header" role="banner">
        <h1 class="logo"><a href="index.html" aria-label="Seedance-2 Home"><img src="icon.png" alt="" class="site-icon" width="32" height="32">Seedance-2</a></h1>
        <a href="index.html" class="back-link">Back to Home</a>
    </header>
    <main class="page-content" role="main">
        <h1>About Us</h1>
        <p>Seedance-2 is your trusted source for news, videos, podcasts, and live updates. Learn more about our mission and team here.</p>
    </main>
</body>
</html>
